name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            target: "aarch64-apple-darwin"
            artifact: "Muse_Generator-macOS"
            bundles: "dmg"
          - platform: "windows-latest"
            target: "x86_64-pc-windows-msvc"
            artifact: "Muse_Generator-Windows"
            bundles: "nsis"

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install npm dependencies
        run: npm install

      - name: Fetch FFmpeg for Windows bundle
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: bash scripts/fetch-ffmpeg-windows.sh

      - name: Build Tauri app (Windows)
        if: matrix.platform == 'windows-latest'
        run: npm run tauri -- build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }} --config src-tauri/tauri.windows.bundle.json
        env:
          CARGO_INCREMENTAL: 0

      - name: Build Tauri app (macOS)
        if: matrix.platform == 'macos-latest'
        run: npm run tauri -- build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
        env:
          CARGO_INCREMENTAL: 0

      - name: Add README to macOS DMG
        if: matrix.platform == 'macos-latest'
        run: |
          DMG_PATH=$(find src-tauri/target/${{ matrix.target }}/release/bundle -name "*.dmg" | head -1)
          if [ -n "$DMG_PATH" ] && [ -f "$DMG_PATH" ]; then
            chmod +x scripts/post_build_dmg.sh
            ./scripts/post_build_dmg.sh "$DMG_PATH"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**
            src-tauri/target/${{ matrix.target }}/release/muse-generator.exe
          retention-days: 14
