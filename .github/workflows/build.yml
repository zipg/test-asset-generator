name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            target: "aarch64-apple-darwin"
            artifact: "Muse_Generator-macOS-ARM64"
            bundles: "dmg"
          - platform: "macos-latest"
            target: "x86_64-apple-darwin"
            artifact: "Muse_Generator-macOS-Intel"
            bundles: "dmg"
          - platform: "windows-latest"
            target: "x86_64-pc-windows-msvc"
            artifact: "Muse_Generator-Windows"
            bundles: "nsis"

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install npm dependencies
        run: npm install

      - name: Fetch FFmpeg for Windows bundle
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: bash scripts/fetch-ffmpeg-windows.sh

      - name: Fetch FFmpeg for macOS bundle
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: bash scripts/fetch-ffmpeg-macos.sh "${{ matrix.target }}"

      - name: Build Tauri app (Windows)
        if: matrix.platform == 'windows-latest'
        run: npm run tauri -- build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }} --config src-tauri/tauri.windows.bundle.json
        env:
          CARGO_INCREMENTAL: 0

      - name: Build Tauri app (macOS)
        if: matrix.platform == 'macos-latest'
        run: npm run tauri -- build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }} --config src-tauri/tauri.macos.bundle.json
        env:
          CARGO_INCREMENTAL: 0

      - name: Add README to macOS DMG
        if: matrix.platform == 'macos-latest'
        run: |
          DMG_PATH=$(find src-tauri/target/${{ matrix.target }}/release/bundle/dmg -name "*.dmg" 2>/dev/null | head -1)
          if [ -z "$DMG_PATH" ]; then
            DMG_PATH=$(find src-tauri/target/${{ matrix.target }}/release/bundle -name "*.dmg" | head -1)
          fi
          if [ -n "$DMG_PATH" ] && [ -f "$DMG_PATH" ]; then
            chmod +x scripts/.inject-dmg-readme.sh
            ./scripts/.inject-dmg-readme.sh "$DMG_PATH"
          fi

      # 仅上传 .dmg：不包含 bundle/macos、share、中间文件等（与 Windows 仅 NSIS 一致）
      - name: Upload artifact (macOS DMG only)
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
          retention-days: 14

      # Windows: only the NSIS installer — do not publish the loose exe (bundled FFmpeg is in the installer).
      - name: Upload artifact (Windows NSIS installer only)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Muse_Generator-Windows-Setup
          path: src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
          retention-days: 14
