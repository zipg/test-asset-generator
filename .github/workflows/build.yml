name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            target: "aarch64-apple-darwin"
            artifact: "Muse_Generator-macOS"
            bundles: "dmg"
          - platform: "windows-latest"
            target: "x86_64-pc-windows-msvc"
            artifact: "Muse_Generator-Windows"
            bundles: "nsis"

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Download FFmpeg
        run: |
          mkdir -p ffmpeg/mac ffmpeg/win
          # macOS FFmpeg
          curl -L "https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip" -o /tmp/ffmpeg.zip
          unzip -o /tmp/ffmpeg.zip -d ffmpeg/mac/
          chmod +x ffmpeg/mac/ffmpeg
          rm /tmp/ffmpeg.zip
          # Windows FFmpeg
          $tempZip = "$env:TEMP\ffmpeg.zip"
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile $tempZip
          Expand-Archive -Path $tempZip -DestinationPath $env:TEMP -Force
          Copy-Item "$env:TEMP\ffmpeg-master-latest-win64-gpl\bin\ffmpeg.exe" -Destination ffmpeg/win/
          Remove-Item $tempZip,"$env:TEMP\ffmpeg-master-latest-win64-gpl" -Recurse -Force -ErrorAction SilentlyContinue

      - name: Install npm dependencies
        run: npm install

      - name: Build Tauri app
        run: npm run tauri build -- --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
        env:
          CARGO_INCREMENTAL: 0

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**
            src-tauri/target/${{ matrix.target }}/release/muse-generator.exe
          retention-days: 14
